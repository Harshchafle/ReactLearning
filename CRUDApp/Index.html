            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        let bulb = document.getElementById('bulb')
        btn.addEventListener('click', toggleBulb)

        function toggleIcon(e){
            bulb.src="images/on.png"
        }
    </script>
</body>
</html>
